<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriVision AI</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">

    <h1>🍽️ NutriVision AI</h1>
    <p>Upload a food image and get nutrition insights</p>

    <input type="file" id="imageInput" accept="image/*">

    <img id="preview" hidden>

    <button id="analyzeBtn">
        Analyze Food
    </button>

    <div id="loading"></div>

    <div id="resultCard" hidden>

        <h2 id="foodName"></h2>

        <div class="stats">
            <div class="box">
                <span id="calories">0</span>
                <p>Calories</p>
            </div>

            <div class="box">
                <span id="protein">0</span>
                <p>Protein</p>
            </div>

            <div class="box">
                <span id="fat">0</span>
                <p>Fat</p>
            </div>

            <div class="box">
                <span id="carbs">0</span>
                <p>Carbs</p>
            </div>
        </div>

        <canvas id="macroChart"></canvas>

    </div>

</div>

<script src="config.js"></script>
<script src="script.js"></script>

</body>
</html>
